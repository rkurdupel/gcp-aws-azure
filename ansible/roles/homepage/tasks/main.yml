- name: ensure helm repo is added
  ansible.builtin.command:
    cmd: helm repo add {{homepage_chart_repo_name}} {{homepage_chart_repo_url}}
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when: 
    - helm_repo_add.rc != 0 # rc - return code
    - "'already exists' not in helm_repo_add.stderr"  # stderr -  standard error - потік помилок
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: update helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: render homepage helm values
  ansible.builtin.template:
    src: homepage-values.yml.j2
    dest: "{{ homepage_values_file }}"
    mode: "0600"

- name: install or upgrade homepage chart
  ansible.builtin.command: >-
    helm upgrade --install {{homepage_release_name}}
    {{homepage_chart_repo_name}}/{{homepage_chart_name}}
    --namespace {{homepage_namespace}}
    --create-namespace
    --version {{homepage_chart_version}}
    --values {{homepage_values_file}}
  register: helm_install
  changed_when: >-
    'STATUS: deployed' in helm_install.stdout or
    'STATUS: pending-upgrade' in helm_install.stdout or
    'STATUS: pending-install' in helm_install.stdout
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  