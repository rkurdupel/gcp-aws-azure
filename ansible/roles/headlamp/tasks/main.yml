- name: ensure helm repo is added
  ansible.builtin.command:
    cmd: helm repo add {{ headlamp_chart_repo_name }} {{ headlamp_chart_repo_url }}
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when:
    - helm_repo_add.rc != 0
    - "'already exists' not in helm_repo_add.stderr"

- name: update helm repos
  ansible.builtin.command: helm repo update
  changed_when: false

- name: render headlamp helm values
  ansible.builtin.template:
    src: headlamp-values.yml.j2
    dest: "{{ headlamp_values_file }}"
    mode: "0600"

- name: install or upgrade headlamp chart
  ansible.builtin.command: >-
    helm upgrade --install {{ headlamp_release_name }}
    {{ headlamp_chart_repo_name }}/{{ headlamp_chart_name }}
    --namespace {{ headlamp_namespace }}
    --create-namespace
    --version {{ headlamp_chart_version }}
    --values {{ headlamp_values_file }}
  register: helm_install
  changed_when: >-
    'STATUS: deployed' in helm_install.stdout or
    'STATUS: pending-upgrade' in helm_install.stdout or
    'STATUS: pending-install' in helm_install.stdout

