- name: ensure manifest directory exists
  ansible.builtin.file:
    path: "{{ cert_manager_manifest_dir }}"
    state: directory
    mode: "0700"

- name: add jetstack helm repo
  ansible.builtin.command:
    cmd: helm repo add {{ cert_manager_chart_repo_name }} {{ cert_manager_chart_repo_url }}
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when:
    - helm_repo_add.rc != 0
    - "'already exists' not in helm_repo_add.stderr"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: update helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: install or upgrade cert-manager
  ansible.builtin.command: >-
    helm upgrade --install {{ cert_manager_release_name }}
    {{ cert_manager_chart_repo_name }}/{{ cert_manager_chart_name }}
    --namespace {{ cert_manager_namespace }}
    --create-namespace
    --version {{ cert_manager_chart_version }}
    --kubeconfig /etc/rancher/k3s/k3s.yaml
    --set crds.enabled=true
  register: helm_install
  changed_when: >-
    'STATUS: deployed' in helm_install.stdout or
    'STATUS: pending-upgrade' in helm_install.stdout or
    'STATUS: pending-install' in helm_install.stdout
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yml

- name: render cloudflare secret manifest
  ansible.builtin.template:
    src: cloudflare-secret.yml.j2
    dest: "{{ cert_manager_manifest_dir }}/cloudflare-secret.yml"
    mode: "0600"
  no_log: true

- name: apply cloudflare secret
  ansible.builtin.command: kubectl apply -f {{ cert_manager_manifest_dir }}/cloudflare-secret.yml --kubeconfig /etc/rancher/k3s/k3s.yaml
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yml

- name: render ClusterIssuer manifests
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ cert_manager_manifest_dir }}/{{ item }}"
    mode: "0600"
  loop:
    - issuer-staging.yml
    - issuer-prod.yml

- name: apply ClusterIssuers
  ansible.builtin.command: kubectl apply -f {{ cert_manager_manifest_dir }}/{{ item }} --kubeconfig /etc/rancher/k3s/k3s.yaml
  loop:
    - issuer-staging.yml
    - issuer-prod.yml
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
